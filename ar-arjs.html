<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AR.js - 宠物卡通3D场景</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
        }
        .ui-overlay > * {
            pointer-events: auto;
        }
        .header {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-toggle {
            padding: 10px 15px;
            font-size: 12px;
        }
        .status {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            z-index: 1000;
        }
        .marker-info {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            max-width: 85%;
            z-index: 1000;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .marker-info.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        .marker-info p {
            margin: 4px 0;
            font-size: 12px;
            color: #333;
        }
        .marker-info a {
            color: #667eea;
            font-weight: bold;
            text-decoration: underline;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.active {
            display: block;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="ui-overlay header">
        <button class="btn" id="backBtn">← 返回</button>
        <button class="btn btn-toggle" id="toggleHintBtn">💡 提示</button>
    </div>

    <a-scene
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        shadow="type: basic;"
    >
        <a-assets>
            <img id="cartoon-img" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png" crossorigin="anonymous" />
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="scene-group">
                <a-entity position="0 0 0">
                    <a-entity id="ground" position="0 0.01 0" rotation="-90 0 0">
                        <a-circle 
                            radius="2" 
                            segments="32"
                            color="#4CAF50"
                            material="side: double; shader: flat;"
                        ></a-circle>
                        <a-torus 
                            radius="2" 
                            radius-tubular="0.02" 
                            segments-radial="8" 
                            color="#2E7D32"
                            material="side: double;"
                            rotation="90 0 0"
                        ></a-torus>
                    </a-entity>

                    <a-entity id="grass-container"></a-entity>

                    <a-entity id="flowers-container"></a-entity>

                    <a-entity id="pet-container" position="0 0.5 0">
                        <a-box 
                            id="pet-shadow"
                            position="0 -0.45 0"
                            rotation="-90 0 0"
                            width="0.6"
                            height="0.6"
                            color="#000"
                            material="opacity: 0.2; transparent: true;"
                        ></a-box>
                        <a-image
                            id="cartoon-image"
                            src="#cartoon-img"
                            position="0 0 0"
                            rotation="0 0 0"
                            width="1"
                            height="1"
                            material="transparent: true; alphaTest: 0.5;"
                        ></a-image>
                    </a-entity>

                    <a-entity id="particles-container"></a-entity>

                    <a-entity id="decorations-container"></a-entity>
                </a-entity>

                <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
                <a-light 
                    type="directional" 
                    color="#ffffff" 
                    intensity="0.8" 
                    position="5 10 7"
                    castShadow="true"
                ></a-light>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="marker-info" id="markerInfo">
        <p>🎯 扫描Hiro标记即可显示AR形象</p>
        <p><a href="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" target="_blank">获取Hiro标记</a></p>
    </div>

    <div class="status" id="status">🔍 扫描中...</div>

    <div class="toast" id="toast"></div>

    <script>
        const EXAMPLE_LEAF_IMG = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png';

        let hintsVisible = true;
        const elements = {
            backBtn: document.getElementById('backBtn'),
            toggleHintBtn: document.getElementById('toggleHintBtn'),
            status: document.getElementById('status'),
            markerInfo: document.getElementById('markerInfo'),
            toast: document.getElementById('toast')
        };

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('active');
            setTimeout(() => {
                elements.toast.classList.remove('active');
            }, 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function toggleHints() {
            hintsVisible = !hintsVisible;
            if (hintsVisible) {
                elements.markerInfo.classList.remove('hidden');
                elements.toggleHintBtn.textContent = '💡 提示';
            } else {
                elements.markerInfo.classList.add('hidden');
                elements.toggleHintBtn.textContent = '👁️ 显示';
            }
        }

        function createGrassBlade(x, z, height, rotation) {
            const grass = document.createElement('a-cone');
            grass.setAttribute('height', height);
            grass.setAttribute('radius-bottom', '0.02');
            grass.setAttribute('radius-top', '0.005');
            grass.setAttribute('color', getRandomGreenColor());
            grass.setAttribute('segments-height', '3');
            grass.setAttribute('position', `${x} ${height / 2} ${z}`);
            grass.setAttribute('rotation', `10 0 ${rotation}`);
            return grass;
        }

        function getRandomGreenColor() {
            const greens = ['#4CAF50', '#66BB6A', '#81C784', '#A5D6A7', '#388E3C', '#2E7D32'];
            return greens[Math.floor(Math.random() * greens.length)];
        }

        function getRandomFlowerColor() {
            const colors = ['#E91E63', '#9C27B0', '#FF5722', '#FFEB3B', '#FF9800', '#F44336'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function createFlower(x, z) {
            const flowerGroup = document.createElement('a-entity');
            flowerGroup.setAttribute('position', `${x} 0 ${z}`);

            const stem = document.createElement('a-cylinder');
            stem.setAttribute('height', '0.3');
            stem.setAttribute('radius', '0.015');
            stem.setAttribute('color', '#4CAF50');
            stem.setAttribute('position', '0 0.15 0');
            flowerGroup.appendChild(stem);

            const petalCount = 5 + Math.floor(Math.random() * 3);
            const flowerColor = getRandomFlowerColor();
            for (let i = 0; i < petalCount; i++) {
                const angle = (i / petalCount) * 360;
                const petal = document.createElement('a-sphere');
                petal.setAttribute('radius', '0.04');
                petal.setAttribute('color', flowerColor);
                petal.setAttribute('position', `${Math.cos(angle * Math.PI / 180) * 0.05} 0.32 ${Math.sin(angle * Math.PI / 180) * 0.05}`);
                petal.setAttribute('scale', '1 0.6 1');
                flowerGroup.appendChild(petal);
            }

            const center = document.createElement('a-sphere');
            center.setAttribute('radius', '0.025');
            center.setAttribute('color', '#FFEB3B');
            center.setAttribute('position', '0 0.32 0');
            flowerGroup.appendChild(center);

            return flowerGroup;
        }

        function createButterfly(x, z) {
            const butterflyGroup = document.createElement('a-entity');
            butterflyGroup.setAttribute('position', `${x} 0.8 ${z}`);

            const body = document.createElement('a-cylinder');
            body.setAttribute('height', '0.08');
            body.setAttribute('radius', '0.01');
            body.setAttribute('color', '#3E2723');
            body.setAttribute('rotation', '90 0 0');
            butterflyGroup.appendChild(body);

            const wingColors = ['#E91E63', '#9C27B0', '#2196F3', '#00BCD4'];
            const wingColor = wingColors[Math.floor(Math.random() * wingColors.length)];

            const leftWing = document.createElement('a-box');
            leftWing.setAttribute('width', '0.12');
            leftWing.setAttribute('height', '0.08');
            leftWing.setAttribute('depth', '0.01');
            leftWing.setAttribute('color', wingColor);
            leftWing.setAttribute('position', '-0.08 0 0');
            leftWing.setAttribute('id', 'left-wing');
            butterflyGroup.appendChild(leftWing);

            const rightWing = document.createElement('a-box');
            rightWing.setAttribute('width', '0.12');
            rightWing.setAttribute('height', '0.08');
            rightWing.setAttribute('depth', '0.01');
            rightWing.setAttribute('color', wingColor);
            rightWing.setAttribute('position', '0.08 0 0');
            rightWing.setAttribute('id', 'right-wing');
            butterflyGroup.appendChild(rightWing);

            butterflyGroup.setAttribute('animation', {
                property: 'position',
                from: `${x} 0.6 ${z}`,
                to: `${x} 1 ${z}`,
                dir: 'alternate',
                loop: true,
                dur: 2000 + Math.random() * 1000,
                easing: 'easeInOutSine'
            });

            return butterflyGroup;
        }

        function createParticle(x, y, z, color) {
            const particle = document.createElement('a-sphere');
            particle.setAttribute('radius', '0.015');
            particle.setAttribute('color', color);
            particle.setAttribute('position', `${x} ${y} ${z}`);
            particle.setAttribute('material', 'transparent: true; opacity: 0.8;');
            return particle;
        }

        function createDecoration(x, z, type) {
            const decoGroup = document.createElement('a-entity');
            decoGroup.setAttribute('position', `${x} 0 ${z}`);

            if (type === 'mushroom') {
                const stem = document.createElement('a-cylinder');
                stem.setAttribute('height', '0.15');
                stem.setAttribute('radius', '0.03');
                stem.setAttribute('color', '#FFECB3');
                stem.setAttribute('position', '0 0.075 0');
                decoGroup.appendChild(stem);

                const cap = document.createElement('a-sphere');
                cap.setAttribute('radius', '0.08');
                cap.setAttribute('color', '#F44336');
                cap.setAttribute('position', '0 0.18 0');
                cap.setAttribute('scale', '1 0.6 1');
                decoGroup.appendChild(cap);

                const dot1 = document.createElement('a-sphere');
                dot1.setAttribute('radius', '0.02');
                dot1.setAttribute('color', '#FFFFFF');
                dot1.setAttribute('position', '0.04 0.2 0.03');
                decoGroup.appendChild(dot1);

                const dot2 = document.createElement('a-sphere');
                dot2.setAttribute('radius', '0.015');
                dot2.setAttribute('color', '#FFFFFF');
                dot2.setAttribute('position', '-0.03 0.22 -0.02');
                decoGroup.appendChild(dot2);
            } else if (type === 'rock') {
                const rock = document.createElement('a-icosahedron');
                rock.setAttribute('radius', '0.1');
                rock.setAttribute('color', '#757575');
                rock.setAttribute('detail', '1');
                rock.setAttribute('position', '0 0.05 0');
                rock.setAttribute('rotation', `${Math.random() * 30} ${Math.random() * 360} ${Math.random() * 30}`);
                rock.setAttribute('scale', `${0.8 + Math.random() * 0.4} ${0.6 + Math.random() * 0.3} ${0.8 + Math.random() * 0.4}`);
                decoGroup.appendChild(rock);
            }

            return decoGroup;
        }

        function initScene() {
            const grassContainer = document.getElementById('grass-container');
            const flowersContainer = document.getElementById('flowers-container');
            const particlesContainer = document.getElementById('particles-container');
            const decorationsContainer = document.getElementById('decorations-container');

            const grassCount = 80;
            for (let i = 0; i < grassCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.3 + Math.random() * 1.6;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const height = 0.15 + Math.random() * 0.2;
                const rotation = Math.random() * 360;
                grassContainer.appendChild(createGrassBlade(x, z, height, rotation));
            }

            const flowerCount = 12;
            for (let i = 0; i < flowerCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.5 + Math.random() * 1.4;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                flowersContainer.appendChild(createFlower(x, z));
            }

            const butterflyCount = 3;
            for (let i = 0; i < butterflyCount; i++) {
                const angle = (i / butterflyCount) * Math.PI * 2;
                const radius = 0.8 + Math.random() * 0.5;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                decorationsContainer.appendChild(createButterfly(x, z));
            }

            const mushroomCount = 2;
            for (let i = 0; i < mushroomCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.8 + Math.random() * 0.8;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                decorationsContainer.appendChild(createDecoration(x, z, 'mushroom'));
            }

            const rockCount = 2;
            for (let i = 0; i < rockCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 1 + Math.random() * 0.8;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                decorationsContainer.appendChild(createDecoration(x, z, 'rock'));
            }

            const particleColors = ['#FFEB3B', '#E91E63', '#2196F3', '#4CAF50'];
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 1.5;
                const x = Math.cos(angle) * radius;
                const y = 0.2 + Math.random() * 0.8;
                const z = Math.sin(angle) * radius;
                const color = particleColors[Math.floor(Math.random() * particleColors.length)];
                const particle = createParticle(x, y, z, color);
                
                particle.setAttribute('animation', {
                    property: 'position',
                    from: `${x} ${y} ${z}`,
                    to: `${x} ${y + 0.3 + Math.random() * 0.3} ${z}`,
                    dir: 'alternate',
                    loop: true,
                    dur: 1500 + Math.random() * 1500,
                    delay: Math.random() * 1000,
                    easing: 'easeInOutSine'
                });
                
                particle.setAttribute('animation__2', {
                    property: 'material.opacity',
                    from: '0.8',
                    to: '0.2',
                    dir: 'alternate',
                    loop: true,
                    dur: 1000 + Math.random() * 1000,
                    delay: Math.random() * 500
                });

                particlesContainer.appendChild(particle);
            }

            const petContainer = document.getElementById('pet-container');
            petContainer.setAttribute('animation', {
                property: 'position',
                from: '0 0.5 0',
                to: '0 0.6 0',
                dir: 'alternate',
                loop: true,
                dur: 2000,
                easing: 'easeInOutSine'
            });

            petContainer.setAttribute('animation__rotation', {
                property: 'rotation',
                from: '0 -10 0',
                to: '0 10 0',
                dir: 'alternate',
                loop: true,
                dur: 4000,
                easing: 'easeInOutSine'
            });
        }

        function applySettings() {
            let cartoonImgSrc = EXAMPLE_LEAF_IMG;
            try {
                const savedCartoon = localStorage.getItem('cartoonUrl');
                if (savedCartoon) {
                    cartoonImgSrc = savedCartoon;
                }
                const cartoonImg = document.getElementById('cartoon-img');
                cartoonImg.setAttribute('src', cartoonImgSrc);
            } catch (e) {
                console.log('Image set error:', e);
            }
        }

        function init() {
            elements.backBtn.addEventListener('click', goBack);
            elements.toggleHintBtn.addEventListener('click', toggleHints);

            applySettings();

            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                setTimeout(initScene, 500);
            } else {
                document.addEventListener('DOMContentLoaded', () => {
                    setTimeout(initScene, 500);
                });
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
