<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AR.js - 宠物卡通3D场景</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
        }
        .ui-overlay > * {
            pointer-events: auto;
        }
        .header {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-toggle {
            padding: 10px 15px;
            font-size: 12px;
        }
        .status {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            z-index: 1000;
        }
        .marker-info {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            max-width: 85%;
            z-index: 1000;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .marker-info.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        .marker-info p {
            margin: 4px 0;
            font-size: 12px;
            color: #333;
        }
        .marker-info a {
            color: #667eea;
            font-weight: bold;
            text-decoration: underline;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.active {
            display: block;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
    <script>
        AFRAME.registerComponent('billboard', {
            tick: function() {
                const sceneEl = this.el.sceneEl;
                if (!sceneEl.camera) return;
                
                const camera = sceneEl.camera.el;
                const cameraPos = camera.object3D.getWorldPosition(new THREE.Vector3());
                const thisPos = this.el.object3D.getWorldPosition(new THREE.Vector3());
                
                this.el.object3D.lookAt(cameraPos.x, thisPos.y, cameraPos.z);
            }
        });

        AFRAME.registerComponent('grass-sway', {
            schema: {
                speed: {type: 'number', default: 1},
                amount: {type: 'number', default: 0.1}
            },
            init: function() {
                this.initialRotation = this.el.object3D.rotation.x;
                this.offset = Math.random() * Math.PI * 2;
            },
            tick: function(time, timeDelta) {
                const sway = Math.sin(time * 0.001 * this.data.speed + this.offset) * this.data.amount;
                this.el.object3D.rotation.x = this.initialRotation + sway;
            }
        });

        AFRAME.registerComponent('float', {
            schema: {
                height: {type: 'number', default: 0.2},
                speed: {type: 'number', default: 1}
            },
            init: function() {
                this.initialY = this.el.object3D.position.y;
                this.offset = Math.random() * Math.PI * 2;
            },
            tick: function(time, timeDelta) {
                const float = Math.sin(time * 0.001 * this.data.speed + this.offset) * this.data.height;
                this.el.object3D.position.y = this.initialY + float;
            }
        });

        AFRAME.registerComponent('rotate-slow', {
            schema: {
                speed: {type: 'number', default: 360}
            },
            tick: function(time, timeDelta) {
                this.el.object3D.rotation.y += (this.data.speed / 1000) * timeDelta * THREE.Math.DEG2RAD;
            }
        });
    </script>
</head>
<body>
    <div class="ui-overlay header">
        <button class="btn" id="backBtn">← 返回</button>
        <button class="btn btn-toggle" id="toggleHintBtn">💡 提示</button>
    </div>

    <a-scene
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        shadow="type: pcfsoft;"
        renderer="antialias: true; logarithmicDepthBuffer: true;"
    >
        <a-assets>
            <img id="cartoon-img" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png" crossorigin="anonymous" />
        </a-assets>

        <a-marker preset="hiro">
            <a-entity id="scene-group">
                <a-entity id="ground-platform" position="0 0 0">
                    <a-cylinder 
                        position="0 0.02 0" 
                        radius="1.8" 
                        height="0.05" 
                        color="#388E3C"
                        segments-radial="32"
                        segments-height="1"
                        shadow="receive: true;"
                    ></a-cylinder>
                    
                    <a-torus 
                        position="0 0.05 0" 
                        radius="1.8" 
                        radius-tubular="0.03" 
                        segments-radial="64"
                        segments-tubular="8"
                        color="#1B5E20"
                        shadow="cast: true; receive: true;"
                    ></a-torus>

                    <a-torus 
                        position="0 0.05 0" 
                        radius="1.2" 
                        radius-tubular="0.015" 
                        segments-radial="48"
                        color="#43A047"
                        shadow="cast: true;"
                    ></a-torus>

                    <a-torus 
                        position="0 0.05 0" 
                        radius="0.6" 
                        radius-tubular="0.01" 
                        segments-radial="32"
                        color="#66BB6A"
                        shadow="cast: true;"
                    ></a-torus>
                </a-entity>

                <a-entity id="grass-patch-container"></a-entity>

                <a-entity id="flower-group"></a-entity>

                <a-entity id="tree-container"></a-entity>

                <a-entity id="decoration-container"></a-entity>

                <a-entity id="pet-platform" position="0 0.05 0">
                    <a-cylinder 
                        position="0 0.05 0"
                        radius="0.5"
                        height="0.1"
                        color="#8D6E63"
                        segments-radial="24"
                        shadow="cast: true; receive: true;"
                    ></a-cylinder>
                    
                    <a-torus 
                        position="0 0.1 0"
                        radius="0.5"
                        radius-tubular="0.02"
                        color="#5D4037"
                        shadow="cast: true;"
                    ></a-torus>

                    <a-entity id="pet-container" position="0 0.6 0" billboard>
                        <a-cylinder 
                            position="0 -0.55 0"
                            radius="0.45"
                            height="0.02"
                            color="#000"
                            rotation="-90 0 0"
                            material="opacity: 0.3; transparent: true;"
                        ></a-cylinder>
                        
                        <a-image
                            id="cartoon-image"
                            src="#cartoon-img"
                            position="0 0 0"
                            width="0.9"
                            height="0.9"
                            material="transparent: true; alphaTest: 0.5;"
                        ></a-image>

                        <a-entity id="pet-glow">
                            <a-ring 
                                position="0 -0.3 0"
                                radius-inner="0.4"
                                radius-outer="0.6"
                                color="#FFD700"
                                rotation="-90 0 0"
                                material="opacity: 0.4; transparent: true;"
                                rotate-slow="speed: 20;"
                            ></a-ring>
                            <a-ring 
                                position="0 -0.3 0"
                                radius-inner="0.3"
                                radius-outer="0.35"
                                color="#FFA500"
                                rotation="-90 0 0"
                                material="opacity: 0.6; transparent: true;"
                                rotate-slow="speed: -30;"
                            ></a-ring>
                        </a-entity>

                        <a-entity id="star-particles"></a-entity>
                    </a-entity>

                    <a-entity id="floaters-container"></a-entity>
                </a-entity>

                <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
                <a-light 
                    type="point" 
                    color="#FFE082" 
                    intensity="1.2" 
                    position="0 2 1"
                    distance="5"
                    decay="2"
                    shadow="cast: true; bias: -0.001;"
                ></a-light>
                <a-light 
                    type="directional" 
                    color="#E3F2FD" 
                    intensity="0.6" 
                    position="-2 3 2"
                    shadow="cast: true; shadowMapWidth: 2048; shadowMapHeight: 2048;"
                ></a-light>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="marker-info" id="markerInfo">
        <p>🎯 扫描Hiro标记即可显示AR形象</p>
        <p><a href="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" target="_blank">获取Hiro标记</a></p>
    </div>

    <div class="status" id="status">🔍 扫描中...</div>

    <div class="toast" id="toast"></div>

    <script>
        const EXAMPLE_LEAF_IMG = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png';

        let hintsVisible = true;
        const elements = {
            backBtn: document.getElementById('backBtn'),
            toggleHintBtn: document.getElementById('toggleHintBtn'),
            status: document.getElementById('status'),
            markerInfo: document.getElementById('markerInfo'),
            toast: document.getElementById('toast')
        };

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('active');
            setTimeout(() => {
                elements.toast.classList.remove('active');
            }, 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function toggleHints() {
            hintsVisible = !hintsVisible;
            if (hintsVisible) {
                elements.markerInfo.classList.remove('hidden');
                elements.toggleHintBtn.textContent = '💡 提示';
            } else {
                elements.markerInfo.classList.add('hidden');
                elements.toggleHintBtn.textContent = '👁️ 显示';
            }
        }

        function getRandomGreenColor() {
            const greens = ['#2E7D32', '#388E3C', '#43A047', '#4CAF50', '#66BB6A', '#81C784'];
            return greens[Math.floor(Math.random() * greens.length)];
        }

        function getRandomFlowerColor() {
            const colors = ['#E91E63', '#9C27B0', '#673AB7', '#3F51B5', '#2196F3', '#00BCD4', '#009688', '#FF5722', '#FF9800'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function createGrassPatch(x, z, scale) {
            const patchGroup = document.createElement('a-entity');
            patchGroup.setAttribute('position', `${x} 0 ${z}`);
            patchGroup.setAttribute('scale', `${scale} ${scale} ${scale}`);

            const grassCount = 5 + Math.floor(Math.random() * 5);
            for (let i = 0; i < grassCount; i++) {
                const angle = (i / grassCount) * Math.PI * 2;
                const radius = 0.03 + Math.random() * 0.05;
                const gx = Math.cos(angle) * radius;
                const gz = Math.sin(angle) * radius;
                const height = 0.15 + Math.random() * 0.2;

                const grass = document.createElement('a-cone');
                grass.setAttribute('height', height);
                grass.setAttribute('radius-bottom', '0.015');
                grass.setAttribute('radius-top', '0.003');
                grass.setAttribute('color', getRandomGreenColor());
                grass.setAttribute('segments-height', '4');
                grass.setAttribute('position', `${gx} ${height / 2} ${gz}`);
                grass.setAttribute('rotation', `${10 + Math.random() * 20} ${Math.random() * 360} 0`);
                grass.setAttribute('grass-sway', `speed: ${0.8 + Math.random() * 0.4}; amount: ${0.08 + Math.random() * 0.08};`);
                grass.setAttribute('shadow', 'cast: true;');
                patchGroup.appendChild(grass);
            }

            return patchGroup;
        }

        function createAdvancedFlower(x, z, scale) {
            const flowerGroup = document.createElement('a-entity');
            flowerGroup.setAttribute('position', `${x} 0.05 ${z}`);
            flowerGroup.setAttribute('scale', `${scale} ${scale} ${scale}`);

            const stem = document.createElement('a-cylinder');
            stem.setAttribute('height', '0.4');
            stem.setAttribute('radius', '0.02');
            stem.setAttribute('color', '#2E7D32');
            stem.setAttribute('segments-height', '4');
            stem.setAttribute('position', '0 0.2 0');
            stem.setAttribute('shadow', 'cast: true;');
            flowerGroup.appendChild(stem);

            const leaf1 = document.createElement('a-cone');
            leaf1.setAttribute('height', '0.15');
            leaf1.setAttribute('radius-bottom', '0.03');
            leaf1.setAttribute('radius-top', '0.005');
            leaf1.setAttribute('color', '#4CAF50');
            leaf1.setAttribute('position', '-0.05 0.15 0');
            leaf1.setAttribute('rotation', '0 0 70');
            flowerGroup.appendChild(leaf1);

            const leaf2 = document.createElement('a-cone');
            leaf2.setAttribute('height', '0.15');
            leaf2.setAttribute('radius-bottom', '0.03');
            leaf2.setAttribute('radius-top', '0.005');
            leaf2.setAttribute('color', '#4CAF50');
            leaf2.setAttribute('position', '0.05 0.12 0');
            leaf2.setAttribute('rotation', '0 0 -70');
            flowerGroup.appendChild(leaf2);

            const flowerColor = getRandomFlowerColor();
            const petalCount = 7 + Math.floor(Math.random() * 4);
            
            for (let i = 0; i < petalCount; i++) {
                const angle = (i / petalCount) * 360;
                const petal = document.createElement('a-sphere');
                petal.setAttribute('radius', '0.06');
                petal.setAttribute('color', flowerColor);
                petal.setAttribute('position', `${Math.cos(angle * Math.PI / 180) * 0.06} 0.42 ${Math.sin(angle * Math.PI / 180) * 0.06}`);
                petal.setAttribute('scale', '0.7 1.3 0.5');
                petal.setAttribute('shadow', 'cast: true;');
                flowerGroup.appendChild(petal);
            }

            const center = document.createElement('a-sphere');
            center.setAttribute('radius', '0.04');
            center.setAttribute('color', '#FFEB3B');
            center.setAttribute('position', '0 0.42 0');
            center.setAttribute('shadow', 'cast: true;');
            flowerGroup.appendChild(center);

            const centerCore = document.createElement('a-sphere');
            centerCore.setAttribute('radius', '0.02');
            centerCore.setAttribute('color', '#FFC107');
            centerCore.setAttribute('position', '0 0.44 0');
            flowerGroup.appendChild(centerCore);

            flowerGroup.setAttribute('float', `height: ${0.03 + Math.random() * 0.03}; speed: ${0.7 + Math.random() * 0.3};`);

            return flowerGroup;
        }

        function createSmallTree(x, z, scale) {
            const treeGroup = document.createElement('a-entity');
            treeGroup.setAttribute('position', `${x} 0.05 ${z}`);
            treeGroup.setAttribute('scale', `${scale} ${scale} ${scale}`);

            const trunk = document.createElement('a-cylinder');
            trunk.setAttribute('height', '0.3');
            trunk.setAttribute('radius', '0.04');
            trunk.setAttribute('color', '#5D4037');
            trunk.setAttribute('segments-radial', '8');
            trunk.setAttribute('position', '0 0.15 0');
            trunk.setAttribute('shadow', 'cast: true;');
            treeGroup.appendChild(trunk);

            const foliageColors = ['#2E7D32', '#388E3C', '#43A047'];
            
            for (let i = 0; i < 3; i++) {
                const foliage = document.createElement('a-cone');
                foliage.setAttribute('height', '0.25');
                foliage.setAttribute('radius-bottom', '0.2 - ' + i * 0.05);
                foliage.setAttribute('radius-top', '0.05');
                foliage.setAttribute('color', foliageColors[i]);
                foliage.setAttribute('segments-radial', '12');
                foliage.setAttribute('position', `0 ${0.35 + i * 0.15} 0`);
                foliage.setAttribute('shadow', 'cast: true;');
                treeGroup.appendChild(foliage);
            }

            return treeGroup;
        }

        function createMushroom(x, z, scale) {
            const mushroomGroup = document.createElement('a-entity');
            mushroomGroup.setAttribute('position', `${x} 0.05 ${z}`);
            mushroomGroup.setAttribute('scale', `${scale} ${scale} ${scale}`);

            const stem = document.createElement('a-cylinder');
            stem.setAttribute('height', '0.2');
            stem.setAttribute('radius', '0.04');
            stem.setAttribute('color', '#FFECB3');
            stem.setAttribute('segments-radial', '8');
            stem.setAttribute('position', '0 0.1 0');
            stem.setAttribute('shadow', 'cast: true;');
            mushroomGroup.appendChild(stem);

            const cap = document.createElement('a-sphere');
            cap.setAttribute('radius', '0.12');
            cap.setAttribute('color', '#E53935');
            cap.setAttribute('segments-width', '16');
            cap.setAttribute('segments-height', '12');
            cap.setAttribute('position', '0 0.22 0');
            cap.setAttribute('scale', '1 0.55 1');
            cap.setAttribute('shadow', 'cast: true;');
            mushroomGroup.appendChild(cap);

            const dotPositions = [
                {x: 0.05, y: 0.26, z: 0.03},
                {x: -0.04, y: 0.24, z: -0.04},
                {x: 0, y: 0.28, z: -0.05},
                {x: -0.06, y: 0.25, z: 0.02}
            ];

            dotPositions.forEach(pos => {
                const dot = document.createElement('a-sphere');
                dot.setAttribute('radius', '0.02');
                dot.setAttribute('color', '#FFFFFF');
                dot.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
                mushroomGroup.appendChild(dot);
            });

            return mushroomGroup;
        }

        function createRock(x, z, scale) {
            const rockGroup = document.createElement('a-entity');
            rockGroup.setAttribute('position', `${x} 0.05 ${z}`);
            rockGroup.setAttribute('scale', `${scale} ${scale} ${scale}`);

            const rock = document.createElement('a-dodecahedron');
            rock.setAttribute('radius', '0.12');
            rock.setAttribute('color', '#616161');
            rock.setAttribute('detail', '0');
            rock.setAttribute('position', '0 0.08 0');
            rock.setAttribute('rotation', `${Math.random() * 45} ${Math.random() * 360} ${Math.random() * 45}`);
            rock.setAttribute('scale', `${0.8 + Math.random() * 0.5} ${0.6 + Math.random() * 0.3} ${0.9 + Math.random() * 0.4}`);
            rock.setAttribute('shadow', 'cast: true; receive: true;');
            rockGroup.appendChild(rock);

            return rockGroup;
        }

        function createFloater(x, z, color, size) {
            const floater = document.createElement('a-icosahedron');
            floater.setAttribute('radius', size);
            floater.setAttribute('color', color);
            floater.setAttribute('detail', '0');
            floater.setAttribute('position', `${x} ${0.5 + Math.random() * 0.8} ${z}`);
            floater.setAttribute('shadow', 'cast: true;');
            floater.setAttribute('float', `height: ${0.15 + Math.random() * 0.2}; speed: ${0.6 + Math.random() * 0.6};`);
            floater.setAttribute('rotate-slow', `speed: ${30 + Math.random() * 60};`);
            floater.setAttribute('material', 'opacity: 0.85; transparent: true;');
            return floater;
        }

        function createStarParticle(x, y, z, delay) {
            const star = document.createElement('a-tetrahedron');
            star.setAttribute('radius', '0.02');
            star.setAttribute('color', '#FFD700');
            star.setAttribute('position', `${x} ${y} ${z}`);
            star.setAttribute('rotate-slow', 'speed: 180;');
            star.setAttribute('material', 'opacity: 0.9; transparent: true;');
            
            star.setAttribute('animation', {
                property: 'position',
                from: `${x} ${y} ${z}`,
                to: `${x} ${y + 0.5} ${z}`,
                dir: 'alternate',
                loop: true,
                dur: 1500 + Math.random() * 1000,
                delay: delay,
                easing: 'easeInOutSine'
            });

            star.setAttribute('animation__opacity', {
                property: 'material.opacity',
                from: '0.9',
                to: '0.3',
                dir: 'alternate',
                loop: true,
                dur: 1000 + Math.random() * 1000,
                delay: delay
            });

            return star;
        }

        function initScene() {
            const grassContainer = document.getElementById('grass-patch-container');
            const flowerGroup = document.getElementById('flower-group');
            const treeContainer = document.getElementById('tree-container');
            const decorationContainer = document.getElementById('decoration-container');
            const floatersContainer = document.getElementById('floaters-container');
            const starParticles = document.getElementById('star-particles');

            const grassPatchCount = 20;
            for (let i = 0; i < grassPatchCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.4 + Math.random() * 1.2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const scale = 0.7 + Math.random() * 0.6;
                grassContainer.appendChild(createGrassPatch(x, z, scale));
            }

            const flowerCount = 8;
            for (let i = 0; i < flowerCount; i++) {
                const angle = (i / flowerCount) * Math.PI * 2 + Math.random() * 0.3;
                const radius = 0.8 + Math.random() * 0.7;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const scale = 0.8 + Math.random() * 0.5;
                flowerGroup.appendChild(createAdvancedFlower(x, z, scale));
            }

            const treeCount = 2;
            for (let i = 0; i < treeCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 1.3 + Math.random() * 0.3;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const scale = 0.6 + Math.random() * 0.4;
                treeContainer.appendChild(createSmallTree(x, z, scale));
            }

            const mushroomCount = 3;
            for (let i = 0; i < mushroomCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.7 + Math.random() * 0.9;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const scale = 0.7 + Math.random() * 0.5;
                decorationContainer.appendChild(createMushroom(x, z, scale));
            }

            const rockCount = 3;
            for (let i = 0; i < rockCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 1 + Math.random() * 0.6;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const scale = 0.6 + Math.random() * 0.5;
                decorationContainer.appendChild(createRock(x, z, scale));
            }

            const floaterColors = ['#E91E63', '#9C27B0', '#2196F3', '#00BCD4', '#4CAF50', '#FF9800'];
            const floaterCount = 12;
            for (let i = 0; i < floaterCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 1.4;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const color = floaterColors[Math.floor(Math.random() * floaterColors.length)];
                const size = 0.03 + Math.random() * 0.04;
                floatersContainer.appendChild(createFloater(x, z, color, size));
            }

            const starCount = 8;
            for (let i = 0; i < starCount; i++) {
                const angle = (i / starCount) * Math.PI * 2;
                const radius = 0.3 + Math.random() * 0.25;
                const x = Math.cos(angle) * radius;
                const y = 0.1 + Math.random() * 0.4;
                const z = Math.sin(angle) * radius;
                const delay = i * 150;
                starParticles.appendChild(createStarParticle(x, y, z, delay));
            }

            const petContainer = document.getElementById('pet-container');
            petContainer.setAttribute('animation', {
                property: 'position',
                from: '0 0.6 0',
                to: '0 0.75 0',
                dir: 'alternate',
                loop: true,
                dur: 2500,
                easing: 'easeInOutSine'
            });
        }

        function applySettings() {
            let cartoonImgSrc = EXAMPLE_LEAF_IMG;
            try {
                const savedCartoon = localStorage.getItem('cartoonUrl');
                if (savedCartoon) {
                    cartoonImgSrc = savedCartoon;
                }
                const cartoonImg = document.getElementById('cartoon-img');
                cartoonImg.setAttribute('src', cartoonImgSrc);
            } catch (e) {
                console.log('Image set error:', e);
            }
        }

        function init() {
            elements.backBtn.addEventListener('click', goBack);
            elements.toggleHintBtn.addEventListener('click', toggleHints);

            applySettings();

            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                setTimeout(initScene, 500);
            } else {
                document.addEventListener('DOMContentLoaded', () => {
                    setTimeout(initScene, 500);
                });
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
