<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AR.js - 宠物卡通</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-overlay {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
        }
        .ui-overlay > * {
            pointer-events: auto;
        }
        .header {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-toggle {
            padding: 10px 15px;
            font-size: 12px;
        }
        .status {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            z-index: 1000;
        }
        .marker-info {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            max-width: 85%;
            z-index: 1000;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .marker-info.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        .marker-info p {
            margin: 4px 0;
            font-size: 12px;
            color: #333;
        }
        .marker-info a {
            color: #667eea;
            font-weight: bold;
            text-decoration: underline;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.active {
            display: block;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="ui-overlay header">
        <button class="btn" id="backBtn">← 返回</button>
        <button class="btn btn-toggle" id="toggleHintBtn">💡 提示</button>
    </div>

    <a-scene
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-assets>
            <img id="cartoon-img" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png" crossorigin="anonymous" />
        </a-assets>

        <a-marker preset="hiro">
            <a-image
                src="#cartoon-img"
                position="0 0 0"
                rotation="-90 0 0"
                width="1"
                height="1"
            ></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="marker-info" id="markerInfo">
        <p>🎯 扫描Hiro标记即可显示AR形象</p>
        <p><a href="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" target="_blank">获取Hiro标记</a></p>
    </div>

    <div class="status" id="status">🔍 扫描中...</div>

    <div class="toast" id="toast"></div>

    <script>
        const EXAMPLE_LEAF_IMG = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png';

        let hintsVisible = true;
        const elements = {
            backBtn: document.getElementById('backBtn'),
            toggleHintBtn: document.getElementById('toggleHintBtn'),
            status: document.getElementById('status'),
            markerInfo: document.getElementById('markerInfo'),
            toast: document.getElementById('toast')
        };

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('active');
            setTimeout(() => {
                elements.toast.classList.remove('active');
            }, 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function toggleHints() {
            hintsVisible = !hintsVisible;
            if (hintsVisible) {
                elements.markerInfo.classList.remove('hidden');
                elements.toggleHintBtn.textContent = '💡 提示';
            } else {
                elements.markerInfo.classList.add('hidden');
                elements.toggleHintBtn.textContent = '👁️ 显示';
            }
        }

        function applySettings() {
            let cartoonImgSrc = EXAMPLE_LEAF_IMG;
            try {
                const savedCartoon = localStorage.getItem('cartoonUrl');
                if (savedCartoon) {
                    cartoonImgSrc = savedCartoon;
                }
                const cartoonImg = document.getElementById('cartoon-img');
                cartoonImg.setAttribute('src', cartoonImgSrc);
            } catch (e) {
                console.log('Image set error:', e);
            }
        }

        function init() {
            elements.backBtn.addEventListener('click', goBack);
            elements.toggleHintBtn.addEventListener('click', toggleHints);

            applySettings();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
