<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AR宠物卡通 - AR.js</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; }
        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .status {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
        .hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 1000;
        }
        .marker-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            max-width: 90%;
        }
        .marker-info img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border: 2px dashed #667eea;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .marker-info p {
            margin: 0;
            font-size: 12px;
            color: #333;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.active {
            display: block;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="btn" id="backBtn">← 返回</button>
        <div class="status" id="status">扫描中...</div>
    </div>

    <a-scene 
        arjs
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="cartoon-img" src="" crossorigin="anonymous">
        </a-assets>

        <a-marker preset="hiro">
            <a-image 
                id="cartoon-image"
                src="https://picsum.photos/400/300?random=1"
                width="2"
                height="2"
                position="0 0 0"
                rotation="-90 0 0">
            </a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="hint" id="hint">将摄像头对准 Hiro 标记</div>

    <div class="marker-info">
        <img src="https://ar-js-org.github.io/AR.js-Docs/data/hiro.png" alt="Hiro标记" onerror="this.src='https://picsum.photos/200/200?random=2'">
        <p>🎯 请用摄像头对准这个标记</p>
        <p style="margin-top: 5px; font-size: 10px; color: #666;">
            <a href="https://ar-js-org.github.io/AR.js-Docs/data/hiro.png" target="_blank" style="color: #667eea;">下载标记</a>
        </p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        'use strict';

        const sceneEl = document.querySelector('a-scene');
        const elements = {
            backBtn: document.getElementById('backBtn'),
            status: document.getElementById('status'),
            hint: document.getElementById('hint'),
            cartoonImage: document.getElementById('cartoon-image'),
            cartoonImg: document.getElementById('cartoon-img'),
            toast: document.getElementById('toast')
        };

        let cartoonUrl = null;

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('active');
            setTimeout(() => {
                elements.toast.classList.remove('active');
            }, 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        async function loadCartoonImage() {
            cartoonUrl = sessionStorage.getItem('cartoonUrl');
            
            if (cartoonUrl) {
                try {
                    elements.cartoonImg.setAttribute('src', cartoonUrl);
                    
                    await new Promise((resolve) => {
                        elements.cartoonImg.onload = resolve;
                        elements.cartoonImg.onerror = resolve;
                    });

                    if (elements.cartoonImage) {
                        elements.cartoonImage.setAttribute('src', '#cartoon-img');
                    }

                    showToast('资源加载成功！');
                } catch (error) {
                    console.error('Load error:', error);
                }
            }
        }

        function init() {
            elements.backBtn.addEventListener('click', goBack);

            sceneEl.addEventListener('markerFound', () => {
                elements.status.textContent = '✅ 识别成功！';
                elements.hint.style.display = 'none';
                showToast('🎉 识别成功！');
            });

            sceneEl.addEventListener('markerLost', () => {
                elements.status.textContent = '🔍 扫描中...';
                elements.hint.style.display = 'block';
            });

            loadCartoonImage();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
