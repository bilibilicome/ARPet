<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR宠物卡通 - 开始</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .option-card {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }
        .option-card.primary {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-color: #667eea;
        }
        .option-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .option-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .option-desc {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .back-link {
            margin-top: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🐾 AR宠物卡通</div>
        <div class="subtitle" id="subtitle">选择您想做什么</div>

        <div class="option-card primary" id="optionContinue" style="display: none;">
            <div class="option-icon">🎮</div>
            <div class="option-title">继续之前的AR</div>
            <div class="option-desc">您之前已经上传过图片了，直接扫描您的图片显示卡通AR效果</div>
        </div>

        <div class="option-card" id="optionUpload">
            <div class="option-icon">📷</div>
            <div class="option-title">上传新图片</div>
            <div class="option-desc">上传新的宠物照片，生成新的卡通形象</div>
        </div>

        <div class="option-card" id="optionQuick">
            <div class="option-icon">✨</div>
            <div class="option-title">快速测试</div>
            <div class="option-desc">使用官方示例卡片，快速测试AR功能</div>
        </div>

        <button class="btn btn-primary" id="goBackBtn">← 返回首页</button>
    </div>

    <a href="index.html" class="back-link">← 返回首页</a>

    <script>
    (function() {
        'use strict';

        const elements = {
            subtitle: document.getElementById('subtitle'),
            optionContinue: document.getElementById('optionContinue'),
            optionUpload: document.getElementById('optionUpload'),
            optionQuick: document.getElementById('optionQuick'),
            goBackBtn: document.getElementById('goBackBtn')
        };

        function checkSavedData() {
            const hasData = localStorage.getItem('hasData');
            const cartoonUrl = localStorage.getItem('cartoonUrl');
            const originalImageUrl = localStorage.getItem('originalImageUrl');
            
            if (hasData === 'true' && cartoonUrl && originalImageUrl) {
                elements.subtitle.textContent = '欢迎回来！继续您的AR体验';
                elements.optionContinue.style.display = 'block';
            }
        }

        elements.optionContinue.addEventListener('click', () => {
            window.location.href = 'ar-ultimate.html';
        });

        elements.optionUpload.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        elements.optionQuick.addEventListener('click', () => {
            window.location.href = 'ar-ultimate.html';
        });

        elements.goBackBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        checkSavedData();
    })();
    </script>
</body>
</html>
