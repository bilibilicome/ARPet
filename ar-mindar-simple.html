<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AR宠物卡通 - MindAR测试</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; }
        .ar-container { position: relative; width: 100%; height: 100vh; }
        .ar-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .ar-header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .back-btn { background: rgba(0, 0, 0, 0.6); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .ar-status { background: rgba(0, 0, 0, 0.6); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; }
        .ar-hint { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.7); color: white; padding: 15px 30px; border-radius: 25px; font-size: 14px; pointer-events: auto; }
        .sample-image { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 15px; text-align: center; pointer-events: auto; max-width: 90%; }
        .sample-image img { width: 150px; height: 150px; object-fit: contain; border: 2px dashed #667eea; border-radius: 10px; margin-bottom: 10px; }
        .sample-image p { margin: 0; font-size: 12px; color: #333; }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.8); color: white; padding: 15px 30px; border-radius: 10px; font-size: 14px; z-index: 2000; display: none; }
        .toast.active { display: block; animation: fadeInOut 2s ease; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0; } 20%, 80% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="ar-container">
        <a-scene 
            mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false">
            
            <a-assets>
                <img id="card-image" src="https://picsum.photos/400/300?random=1" crossorigin="anonymous">
            </a-assets>

            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

            <a-entity mindar-image-target="targetIndex: 0">
                <a-plane 
                    src="#card-image"
                    width="1.5"
                    height="1.5"
                    position="0 0 0"
                    rotation="-90 0 0"
                    material="transparent: true;">
                </a-plane>
            </a-entity>
        </a-scene>

        <div class="ar-overlay">
            <div class="ar-header">
                <button class="back-btn" id="backBtn">← 返回</button>
                <div class="ar-status" id="arStatus">扫描中...</div>
            </div>

            <div class="ar-hint" id="arHint">将摄像头对准目标图片</div>

            <div class="sample-image">
                <img src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" alt="目标图片" onerror="this.src='https://picsum.photos/200/200?random=2'">
                <p>📱 请用摄像头对准MindAR示例卡片</p>
                <p style="margin-top: 5px; font-size: 10px; color: #666;">或访问: https://bit.ly/3G9VZxL 下载示例卡片</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        'use strict';

        const sceneEl = document.querySelector('a-scene');
        const elements = {
            backBtn: document.getElementById('backBtn'),
            arStatus: document.getElementById('arStatus'),
            arHint: document.getElementById('arHint'),
            toast: document.getElementById('toast')
        };

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('active');
            setTimeout(() => {
                elements.toast.classList.remove('active');
            }, 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        sceneEl.addEventListener('targetFound', () => {
            elements.arStatus.textContent = '识别成功！';
            elements.arHint.style.display = 'none';
            showToast('🎉 识别成功！');
        });

        sceneEl.addEventListener('targetLost', () => {
            elements.arStatus.textContent = '扫描中...';
            elements.arHint.style.display = 'block';
        });

        elements.backBtn.addEventListener('click', goBack);
    })();
    </script>
</body>
</html>
