<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AR宠物卡通 - MindAR</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            width: 100vw;
            height: 100vh;
        }
        a-scene {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
        }
        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .status {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            flex: 1;
            text-align: center;
        }
        .hint {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 1000;
        }
        .target-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            max-width: 90%;
        }
        .target-info img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border: 2px dashed #667eea;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .target-info p {
            margin: 0;
            font-size: 12px;
            color: #333;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.active {
            display: block;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="btn" id="backBtn">← 返回</button>
        <div class="status" id="status">🔍 扫描中...</div>
    </div>

    <a-scene 
        id="arScene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="cartoon-img" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png" crossorigin="anonymous">
        </a-assets>

        <a-mindar-image-target="targetIndex: 0">
            <a-image 
                id="cartoon-image"
                src="#cartoon-img"
                width="2"
                height="2"
                position="0 0 0"
                rotation="-90 0 0">
            </a-image>
        </a-mindar-image-target>

        <a-entity camera></a-entity>
    </a-scene>

    <div class="hint" id="hint">将摄像头对准目标图片</div>

    <div class="target-info" id="targetInfo">
        <img id="targetPreviewImg" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" alt="目标图片">
        <p id="targetInfoText">🎯 当前：官方示例</p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        'use strict';

        const EXAMPLE_LEAF_IMG = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png';
        const EXAMPLE_TARGET_IMG = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png';

        const sceneEl = document.getElementById('arScene');
        const elements = {
            backBtn: document.getElementById('backBtn'),
            status: document.getElementById('status'),
            hint: document.getElementById('hint'),
            targetInfo: document.getElementById('targetInfo'),
            targetPreviewImg: document.getElementById('targetPreviewImg'),
            targetInfoText: document.getElementById('targetInfoText'),
            cartoonImage: document.getElementById('cartoon-image'),
            cartoonImg: document.getElementById('cartoon-img'),
            toast: document.getElementById('toast')
        };

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('active');
            setTimeout(() => {
                elements.toast.classList.remove('active');
            }, 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function applySettings() {
            const savedCartoonUrl = localStorage.getItem('cartoonUrl');
            const savedOriginalUrl = localStorage.getItem('originalImageUrl');

            let cartoonImgSrc = savedCartoonUrl || EXAMPLE_LEAF_IMG;
            let targetPreview = EXAMPLE_TARGET_IMG;
            let targetText = '🎯 当前：官方示例';

            if (savedOriginalUrl) {
                targetPreview = savedOriginalUrl;
                targetText = '🎯 请用摄像头对准您保存的原图';
            }

            elements.targetPreviewImg.src = targetPreview;
            elements.targetInfoText.textContent = targetText;

            try {
                elements.cartoonImg.setAttribute('src', cartoonImgSrc);
            } catch (e) {
                console.log('Image set error:', e);
            }
        }

        function init() {
            elements.backBtn.addEventListener('click', goBack);

            sceneEl.addEventListener('targetFound', () => {
                elements.status.textContent = '✅ 识别成功！';
                elements.hint.style.display = 'none';
                elements.targetInfo.style.display = 'none';
                showToast('🎉 识别成功！');
            });

            sceneEl.addEventListener('targetLost', () => {
                elements.status.textContent = '🔍 扫描中...';
                elements.hint.style.display = 'block';
                elements.targetInfo.style.display = 'block';
            });

            applySettings();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
