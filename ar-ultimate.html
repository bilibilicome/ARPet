<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AR宠物卡通 - 终极版</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
            width: 100vw;
            height: 100vh;
        }
        a-scene { 
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important; 
            height: 100vh !important; 
        }
        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .btn {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .status {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            flex: 1;
            text-align: center;
        }
        .hint {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 1000;
        }
        .target-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            max-width: 90%;
        }
        .target-info img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border: 2px dashed #667eea;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .target-info p {
            margin: 0;
            font-size: 12px;
            color: #333;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
        .toast.active {
            display: block;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
        .upload-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .upload-modal.active {
            display: flex;
        }
        .upload-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .upload-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-box:hover {
            background: #f0f0ff;
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #667eea;
            font-weight: bold;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-full {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="mainContent">
        <div class="header">
            <button class="btn" id="backBtn">← 返回</button>
            <div class="status" id="status">🔍 扫描中...</div>
            <button class="btn btn-upload" id="uploadMindBtn">📁 上传</button>
        </div>

        <a-scene 
            id="arScene"
            mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false">
            
            <a-assets>
                <img id="cartoon-img" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png" crossorigin="anonymous">
            </a-assets>

            <a-mindar-image-target="targetIndex: 0">
                <a-image 
                    id="cartoon-image"
                    src="#cartoon-img"
                    width="2"
                    height="2"
                    position="0 0 0"
                    rotation="-90 0 0">
                </a-image>
            </a-mindar-image-target>

            <a-entity camera></a-entity>
        </a-scene>

        <div class="hint" id="hint">将摄像头对准目标图片</div>

        <div class="target-info" id="targetInfo">
            <img id="targetPreviewImg" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" alt="目标图片">
            <p id="targetInfoText">🎯 当前：官方示例</p>
            <p style="margin-top: 8px; font-size: 10px; color: #666;">
                点击右上角上传您的 .mind 文件
            </p>
        </div>

        <div class="upload-modal" id="uploadModal">
            <div class="upload-content">
                <div class="upload-title">📁 上传 .mind 文件</div>
                <div class="upload-box" id="uploadBox">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">点击选择或拖拽文件</div>
                    <div class="upload-hint">支持 .mind 格式</div>
                </div>
                <input type="file" id="fileInput" accept=".mind" style="display: none;">
                <div class="btn-group">
                    <button class="btn-full btn-secondary" id="cancelBtn">取消</button>
                    <button class="btn-full btn-primary" id="useExampleBtn">用回示例</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
    (function() {
        'use strict';

        const EXAMPLE_MIND_URL = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind';
        const EXAMPLE_TARGET_IMG = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png';
        const EXAMPLE_LEAF_IMG = 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png';

        const elements = {
            backBtn: document.getElementById('backBtn'),
            status: document.getElementById('status'),
            hint: document.getElementById('hint'),
            targetInfo: document.getElementById('targetInfo'),
            targetPreviewImg: document.getElementById('targetPreviewImg'),
            targetInfoText: document.getElementById('targetInfoText'),
            cartoonImage: document.getElementById('cartoon-image'),
            cartoonImg: document.getElementById('cartoon-img'),
            uploadMindBtn: document.getElementById('uploadMindBtn'),
            uploadModal: document.getElementById('uploadModal'),
            uploadBox: document.getElementById('uploadBox'),
            fileInput: document.getElementById('fileInput'),
            cancelBtn: document.getElementById('cancelBtn'),
            useExampleBtn: document.getElementById('useExampleBtn'),
            toast: document.getElementById('toast'),
            mainContent: document.getElementById('mainContent'),
            arScene: document.getElementById('arScene')
        };

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('active');
            setTimeout(() => {
                elements.toast.classList.remove('active');
            }, 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function applySettings() {
            const useCustomMind = localStorage.getItem('useCustomMind');
            const customMindUrl = localStorage.getItem('customMindUrl');
            const customTargetPreview = localStorage.getItem('customTargetPreview');
            const customTargetText = localStorage.getItem('customTargetText');
            const customCartoonUrl = localStorage.getItem('customCartoonUrl');

            let cartoonImgSrc = localStorage.getItem('cartoonUrl') || EXAMPLE_LEAF_IMG;
            let targetPreview = EXAMPLE_TARGET_IMG;
            let targetText = '🎯 当前：官方示例';

            if (useCustomMind === 'true' && customMindUrl) {
                if (customCartoonUrl) {
                    cartoonImgSrc = customCartoonUrl;
                }
                if (customTargetPreview) {
                    targetPreview = customTargetPreview;
                }
                if (customTargetText) {
                    targetText = customTargetText;
                }
            } else {
                const savedOriginalUrl = localStorage.getItem('originalImageUrl');
                if (savedOriginalUrl) {
                    targetPreview = savedOriginalUrl;
                    targetText = '🎯 请用摄像头对准您保存的原图';
                }
            }

            elements.targetPreviewImg.src = targetPreview;
            elements.targetInfoText.textContent = targetText;

            try {
                elements.cartoonImg.setAttribute('src', cartoonImgSrc);
            } catch (e) {
                console.log('Image set error:', e);
            }
        }

        function handleFileUpload(file) {
            if (!file) return;
            
            if (!file.name.endsWith('.mind')) {
                showToast('请上传 .mind 文件！');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const arrayBuffer = e.target.result;
                const blob = new Blob([arrayBuffer], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                
                localStorage.setItem('customMindUrl', url);
                localStorage.setItem('useCustomMind', 'true');
                
                const cartoonUrl = localStorage.getItem('cartoonUrl') || EXAMPLE_LEAF_IMG;
                const originalImageUrl = localStorage.getItem('originalImageUrl');
                let targetPreview = originalImageUrl || EXAMPLE_TARGET_IMG;
                let targetText = originalImageUrl ? '🎯 您的自定义目标' : '🎯 当前：官方示例';
                
                localStorage.setItem('customTargetPreview', targetPreview);
                localStorage.setItem('customTargetText', targetText);
                localStorage.setItem('customCartoonUrl', cartoonUrl);
                
                showToast('请刷新页面使用新目标');
                elements.uploadModal.classList.remove('active');
            };
            reader.readAsArrayBuffer(file);
        }

        function resetToExample() {
            localStorage.removeItem('customMindUrl');
            localStorage.removeItem('useCustomMind');
            localStorage.removeItem('customTargetPreview');
            localStorage.removeItem('customTargetText');
            localStorage.removeItem('customCartoonUrl');
            
            showToast('请刷新页面');
            elements.uploadModal.classList.remove('active');
        }

        function initSceneWithCustomMind() {
            const useCustomMind = localStorage.getItem('useCustomMind');
            const customMindUrl = localStorage.getItem('customMindUrl');
            
            if (useCustomMind === 'true' && customMindUrl) {
                showToast('使用自定义目标文件，请先刷新页面');
                return false;
            }
            
            return true;
        }

        function init() {
            elements.backBtn.addEventListener('click', goBack);

            elements.uploadMindBtn.addEventListener('click', () => {
                elements.uploadModal.classList.add('active');
            });

            elements.uploadBox.addEventListener('click', () => {
                elements.fileInput.click();
            });

            elements.fileInput.addEventListener('change', (e) => {
                handleFileUpload(e.target.files[0]);
            });

            elements.cancelBtn.addEventListener('click', () => {
                elements.uploadModal.classList.remove('active');
            });

            elements.useExampleBtn.addEventListener('click', () => {
                resetToExample();
            });

            elements.uploadBox.addEventListener('dragover', (e) => {
                e.preventDefault();
                elements.uploadBox.style.background = '#e0e0ff';
            });

            elements.uploadBox.addEventListener('dragleave', () => {
                elements.uploadBox.style.background = '';
            });

            elements.uploadBox.addEventListener('drop', (e) => {
                e.preventDefault();
                elements.uploadBox.style.background = '';
                handleFileUpload(e.dataTransfer.files[0]);
            });

            const sceneEl = document.getElementById('arScene');
            sceneEl.addEventListener('targetFound', () => {
                elements.status.textContent = '✅ 识别成功！';
                elements.hint.style.display = 'none';
                elements.targetInfo.style.display = 'none';
                showToast('🎉 识别成功！');
            });

            sceneEl.addEventListener('targetLost', () => {
                elements.status.textContent = '🔍 扫描中...';
                elements.hint.style.display = 'block';
                elements.targetInfo.style.display = 'block';
            });

            applySettings();
            initSceneWithCustomMind();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
