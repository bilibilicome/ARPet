server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: arpet-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 自定义配置
arpet:
  file:
    upload-path: src/main/resources/static/uploads
    cartoon-path: src/main/resources/static/cartoons
  server:
    base-url: http://localhost:8080/api
