<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      .ui-overlay {
        position: fixed;
        z-index: 1000;
        pointer-events: none;
      }
      .ui-overlay > * {
        pointer-events: auto;
      }
      .header {
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .btn {
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .status {
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        flex: 1;
        text-align: center;
      }
      .hint {
        bottom: 200px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px 30px;
        border-radius: 25px;
        font-size: 14px;
      }
      .card-container {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        padding: 10px;
        border-radius: 15px;
        text-align: center;
        max-width: 90%;
      }
      .card-container img {
        width: 200px;
        height: auto;
        border-radius: 10px;
      }
      .card-container p {
        margin: 5px 0 0 0;
        font-size: 12px;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="ui-overlay header">
      <button class="btn" id="backBtn">← 返回</button>
      <div class="status" id="status">🔍 扫描中...</div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="leaf" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image
          src="#leaf"
          alpha-test="0.5"
          width="0.552"
          height="0.552"
          position="0 0 0"
        ></a-image>
      </a-entity>
    </a-scene>

    <div class="ui-overlay hint">用另一台设备显示下方的卡片，然后用摄像头扫描</div>

    <div class="ui-overlay card-container" id="cardContainer">
      <img src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" alt="示例卡片">
      <p>👆 用另一台设备显示这个卡片，或打印出来</p>
    </div>

    <script>
      document.getElementById('backBtn').addEventListener('click', function() {
        window.location.href = 'index.html';
      });

      const sceneEl = document.querySelector('a-scene');
      const status = document.getElementById('status');
      const hint = document.getElementById('hint');
      const cardContainer = document.getElementById('cardContainer');

      sceneEl.addEventListener('targetFound', function() {
        status.textContent = '✅ 识别成功！';
        hint.style.display = 'none';
        cardContainer.style.display = 'none';
      });

      sceneEl.addEventListener('targetLost', function() {
        status.textContent = '🔍 扫描中...';
        hint.style.display = 'block';
        cardContainer.style.display = 'block';
      });
    </script>
  </body>
</html>
