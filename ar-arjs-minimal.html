<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR.js 最简测试</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene arjs>
        <a-marker preset="hiro">
            <a-box position='0 0.5 0' material='color: red;'></a-box>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
    
    <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 15px; border-radius: 10px; text-align: center; font-family: Arial;">
        <p style="margin: 0 0 10px 0; font-size: 14px;">🎯 对准 Hiro 标记</p>
        <p style="margin: 0; font-size: 12px;">
            <a href="https://ar-js-org.github.io/AR.js-Docs/data/hiro.png" target="_blank" style="color: blue;">下载标记</a>
        </p>
    </div>
</body>
</html>
