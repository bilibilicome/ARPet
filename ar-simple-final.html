<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
      }
      .status-text {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <button class="back-btn" id="backBtn">← 返回</button>
    <div class="status-text" id="statusText">🔍 扫描中...</div>

    <a-scene
      id="arScene"
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="leaf" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/leaf.png" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image
          src="#leaf"
          alpha-test="0.5"
          width="0.552"
          height="0.552"
          position="0 0 0"
        ></a-image>
      </a-entity>
    </a-scene>

    <script>
      document.getElementById('backBtn').addEventListener('click', function() {
        window.location.href = 'index.html';
      });

      const sceneEl = document.getElementById('arScene');
      const statusText = document.getElementById('statusText');

      sceneEl.addEventListener('targetFound', function() {
        statusText.textContent = '✅ 识别成功！';
      });

      sceneEl.addEventListener('targetLost', function() {
        statusText.textContent = '🔍 扫描中...';
      });
    </script>
  </body>
</html>
